<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Quiz App</title>

  <!-- CSS FILE -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h2>🎯 Quiz App</h2>
    <p>Fun • Learn • Play</p>
  </header>

  <!-- ================= HOME / CATEGORY SCREEN ================= -->
  <div id="category-screen" class="screen show">

    <button onclick="startQuiz('gk')">GK</button>

    <button onclick="startQuiz('movies')">Movies</button>

    <button onclick="startQuiz('sports')">Sports</button>

    <button onclick="startQuiz('ipl')">IPL</button>

    <button onclick="startQuiz('politics')">Politics</button>

    <button onclick="startQuiz('native')">Native</button>

    <button onclick="startQuiz('series')">Series</button>

    <button onclick="startQuiz('friendship')">Friendship</button>

    <button onclick="startQuiz('love')">Love</button>

    <button onclick="startQuiz('anime')">Anime</button>

    <button onclick="startQuiz('meme')">Meme</button>

    <button onclick="startQuiz('gaming')">Gaming</button>

    <button onclick="startQuiz('genz')">Gen Z</button>

    <button onclick="startQuiz('tamil_music')">
      Tamil Songs
    </button>

    <button onclick="startQuiz('english_music')">
      English Songs
    </button>

    <button onclick="startQuiz('gentleman')">
      Gentleman
    </button>

    <button onclick="startQuiz('gentlewoman')">
      Gentlewoman
    </button>

    <button onclick="showCreateQuiz()">
      ➕ Create Your Own Quiz
    </button>

  </div>

  <!-- ================= QUIZ SCREEN ================= -->
  <div id="quiz-box" class="screen hidden">

    <div class="container">
      <h1 id="quiz-title"></h1>
      <!-- QUESTION COUNT -->
      <p id="question-count"></p>

      <!-- PROGRESS BAR -->
      <div class="progress-container">
        <div id="progress-bar"></div>
      </div>

      <!-- QUESTION -->
      <h2 id="question"></h2>

      <!-- OPTIONS -->
      <div id="options"></div>

      <!-- NEXT BUTTON -->
      <button id="nextBtn">Next</button>

    </div>

  </div>

  <!-- ================= RESULT SCREEN ================= -->
  <div id="result" class="screen hidden">

    <div class="container">

      <h1 id="result-title"></h1>

      <h2 id="score"></h2>

      <p id="result-message"></p>

      <button onclick="goHome()">
        Back to Categories
      </button>

    </div>

  </div>

  <!-- ================= CREATE QUIZ SCREEN ================= -->
  <div id="create-screen" class="screen hidden">

    <div class="container">

      <h1>Create Quiz</h1>
      <input
        type="text"
        id="quiz-name"
        placeholder="Enter Quiz Title"
      />

      <input
        type="text"
        id="custom-question"
        placeholder="Enter question"
      />

      <input
        type="text"
        id="option1"
        placeholder="Option 1"
      />

      <input
        type="text"
        id="option2"
        placeholder="Option 2"
      />

      <input
        type="text"
        id="option3"
        placeholder="Option 3"
      />

      <input
        type="text"
        id="option4"
        placeholder="Option 4"
      />

      <input
        type="text"
        id="correct-answer"
        placeholder="Correct Answer"
      />

      <button onclick="saveQuestion()">
        Save Question
      </button>

      <button onclick="playCustomQuiz()">
        ▶ Play My Quiz
      </button>

      <br />

      <button onclick="goHome()">
        ⬅ Back Home
      </button>
      <button onclick="generateShareLink()">
          🔗 Generate Share Link
      </button>

    </div>

  </div>

  <!-- JS FILE -->
  <script src="script.js"></script>

</body>
</html>
